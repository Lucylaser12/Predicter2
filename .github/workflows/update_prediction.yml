name: BTC Prediction Update

# Ye workflow har ghante automatic chalega, aur manually bhi chala sakte hain
on:
  schedule:
    - cron: "5 * * * *"   # har ghante, 5th minute pe (UTC time)
  workflow_dispatch:        # GitHub UI se "Run workflow" button se manual run

permissions:
  contents: write   # taaki workflow prediction.json ko repo me commit kar sake

jobs:
  update-prediction:
    runs-on: ubuntu-latest
    steps:
      - name: Repo checkout karo
        uses: actions/checkout@v4

      - name: Python setup karo
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies install karo
        run: pip install -r pipeline/requirements.txt

      - name: Prediction pipeline chalao
        working-directory: pipeline
        run: python predict_and_save.py

      - name: prediction.json ko website folder me copy karo
        run: cp pipeline/prediction.json website/public/prediction.json

      - name: Naya prediction GitHub me commit karo
        run: |
          set -e
          git config user.name "btc-bot-automation"
          git config user.email "actions@github.com"
          git add website/public/prediction.json
          if git diff --staged --quiet; then
            echo "Kuch naya change nahi hai, commit skip kar rahe hain."
          else
            git commit -m "Auto-update prediction $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:${{ github.ref_name }}
          fi
